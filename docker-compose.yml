services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_NAME:-questizsurvey_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-questizsurvey_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
    environment:
      ENVIRONMENT: production
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DEBUG: "False"
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: ${DB_NAME:-questizsurvey_db}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: db
      DB_PORT: "5432"
      REDIS_HOST: redis
      CELERY_BROKER_URL: redis://redis:6379/2
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-survey.mindspear.app,localhost}
      APP_ORIGIN: ${APP_ORIGIN:-https://survey.mindspear.app}
      API_ORIGIN: ${API_ORIGIN:-https://survey.mindspear.app}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-https://survey.mindspear.app}
      API_BASE_URL: ${API_BASE_URL:-https://survey.mindspear.app/api}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://survey.mindspear.app}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-https://survey.mindspear.app}
      SECURE_SSL_REDIRECT: "False"
      USE_X_FORWARDED_HOST: "True"
      CSRF_COOKIE_SECURE: "True"
      SESSION_COOKIE_SECURE: "True"
      EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.smtp.EmailBackend}
      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-True}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-no-reply@mindspear.app}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      BKASH_APP_KEY: ${BKASH_APP_KEY:-}
      BKASH_APP_SECRET: ${BKASH_APP_SECRET:-}
      BKASH_USERNAME: ${BKASH_USERNAME:-}
      BKASH_PASSWORD: ${BKASH_PASSWORD:-}
      BKASH_BASE_URL: ${BKASH_BASE_URL:-}
      BKASH_CALLBACK_TRUSTED_IPS: ${BKASH_CALLBACK_TRUSTED_IPS:-}
      BKASH_WEBHOOK_URL: ${BKASH_WEBHOOK_URL:-}
      BKASH_WEBHOOK_TOPIC_ARN: ${BKASH_WEBHOOK_TOPIC_ARN:-}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-2}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-120}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A questizsurvey worker -l info
    volumes:
      - media_files:/app/media
    environment:
      ENVIRONMENT: production
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DEBUG: "False"
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: ${DB_NAME:-questizsurvey_db}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: db
      DB_PORT: "5432"
      REDIS_HOST: redis
      CELERY_BROKER_URL: redis://redis:6379/2
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      APP_ORIGIN: ${APP_ORIGIN:-https://survey.mindspear.app}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-https://survey.mindspear.app}
      API_BASE_URL: ${API_BASE_URL:-https://survey.mindspear.app/api}
      EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.smtp.EmailBackend}
      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-True}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-no-reply@mindspear.app}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      BKASH_APP_KEY: ${BKASH_APP_KEY:-}
      BKASH_APP_SECRET: ${BKASH_APP_SECRET:-}
      BKASH_USERNAME: ${BKASH_USERNAME:-}
      BKASH_PASSWORD: ${BKASH_PASSWORD:-}
      BKASH_BASE_URL: ${BKASH_BASE_URL:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A questizsurvey beat -l info
    environment:
      ENVIRONMENT: production
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DEBUG: "False"
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: ${DB_NAME:-questizsurvey_db}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: db
      DB_PORT: "5432"
      REDIS_HOST: redis
      CELERY_BROKER_URL: redis://redis:6379/2
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_files:/app/staticfiles:ro
      - media_files:/app/media:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  redis_data:
  static_files:
  media_files:
